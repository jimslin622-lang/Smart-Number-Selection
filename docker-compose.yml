services:
  postgres:
    image: postgres:16
    container_name: random-number-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: random_number_helper
      POSTGRES_USER: random_user
      POSTGRES_PASSWORD: random_pass_change_me
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - random_number_pgdata:/var/lib/postgresql/data
      - ./backend/server/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U random_user -d random_number_helper"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    container_name: random-number-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      APP_VERSION: 0.1.0-docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: random_number_helper
      DB_USER: random_user
      DB_PASSWORD: random_pass_change_me
      DB_SSL: "false"
      CORS_ORIGIN: "*"
      AUTO_SEED: "false"
    ports:
      - "3000:3000"

volumes:
  random_number_pgdata:
